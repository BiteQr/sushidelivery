<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sapa Delivery — Меню</title>
    <!-- Подключаем Telegram WebApp API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Переменные фирменных цветов Додо */
        :root {
            --dodo-orange: #ff6600;
            --dodo-orange-hover: #e65c00;
            --dodo-light-orange: #fff0e6;
            --dodo-bg: #ffffff;
            --dodo-secondary-bg: #f3f3f7;
            --dodo-text-dark: #111111;
            --dodo-text-muted: #5c6370;
            --dodo-border: #e2e2e9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--dodo-bg);
            color: var(--dodo-text-dark);
            padding-bottom: 100px; /* Отступ для нижней панели корзины */
            overflow-x: hidden;
        }

        /* Шапка сайта */
        header {
            padding: 16px 16px 8px 16px;
            background: var(--dodo-bg);
        }

        .city-selector {
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--dodo-text-dark);
        }

        .city-selector span {
            color: var(--dodo-orange);
            border-bottom: 2px dotted var(--dodo-orange);
            cursor: pointer;
        }

        /* Горизонтальные баннеры (Истории / Акции) */
        .stories-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 12px 16px;
            scroll-behavior: smooth;
        }
        .stories-container::-webkit-scrollbar { display: none; }

        .story-card {
            flex: 0 0 140px;
            height: 90px;
            border-radius: 16px;
            background: linear-gradient(135deg, #ff9800, var(--dodo-orange));
            color: white;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 4px 10px rgba(255, 102, 0, 0.15);
        }
        .story-card.promo-2 { background: linear-gradient(135deg, #4caf50, #2e7d32); }

        /* Навигация по категориям (Липкая лента) */
        .categories-nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 10px 16px;
            border-bottom: 1px solid var(--dodo-border);
        }
        .categories-nav::-webkit-scrollbar { display: none; }

        .category-tab {
            padding: 8px 16px;
            background-color: var(--dodo-secondary-bg);
            color: var(--dodo-text-dark);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .category-tab.active {
            background-color: var(--dodo-light-orange);
            color: var(--dodo-orange);
        }

        /* Списки товаров */
        .category-section {
            padding: 20px 16px 0 16px;
        }

        .category-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 16px;
        }

        /* Карточка товара в стиле Додо Мобайл (Список) */
        .products-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .product-card {
            display: flex;
            gap: 16px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--dodo-border);
            align-items: flex-start;
        }

        .product-image {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 16px;
            background-color: var(--dodo-secondary-bg);
            flex-shrink: 0;
        }

        .product-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            min-height: 120px;
        }

        .product-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--dodo-text-dark);
            margin-bottom: 6px;
        }

        .product-description {
            font-size: 13px;
            color: var(--dodo-text-muted);
            line-height: 1.4;
            margin-bottom: 12px;
            flex-grow: 1;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
        }

        /* Кнопка стоимости товара */
        .dodo-btn-price {
            background-color: var(--dodo-light-orange);
            color: var(--dodo-orange);
            border: none;
            padding: 8px 16px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.1s ease;
        }
        .dodo-btn-price:active {
            transform: scale(0.95);
            background-color: var(--dodo-orange);
            color: white;
        }

        /* Переключатель количества (- 1 +) когда товар добавлен */
        .counter-control {
            display: flex;
            align-items: center;
            background-color: var(--dodo-light-orange);
            border-radius: 18px;
            overflow: hidden;
        }

        .counter-btn {
            background: none;
            border: none;
            color: var(--dodo-orange);
            font-size: 18px;
            font-weight: 700;
            padding: 6px 14px;
            cursor: pointer;
        }

        .counter-value {
            color: var(--dodo-orange);
            font-size: 14px;
            font-weight: 700;
            min-width: 20px;
            text-align: center;
        }

        /* Кнопка корзины снизу */
        .bottom-cart-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px 24px 16px;
            border-top: 1px solid var(--dodo-border);
            z-index: 999;
            display: none; /* Показывается только когда в корзине есть вещи */
            animation: slideUp 0.2s ease-out;
        }

        .dodo-cart-btn {
            width: 100%;
            background-color: var(--dodo-orange);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 24px;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 102, 0, 0.3);
        }

        .dodo-cart-btn:active {
            background-color: var(--dodo-orange-hover);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Шапка приложения -->
    <header>
        <div class="city-selector">Доставка: <span>Уральск</span></div>
    </header>

    <!-- Акционные баннеры (Аналог историй Додо) -->
    <div class="stories-container">
        <div class="story-card promo-1">
            <span>🎁 Морс в подарок</span>
            <span style="font-size: 10px; font-weight: normal; opacity: 0.9;">При первом заказе</span>
        </div>
        <div class="story-card promo-2">
            <span>🔥 Сет Недели</span>
            <span style="font-size: 10px; font-weight: normal; opacity: 0.9;">Скидка -15%</span>
        </div>
        <div class="story-card promo-1">
            <span>🚲 Быстрая доставка</span>
            <span style="font-size: 10px; font-weight: normal; opacity: 0.9;">До 45 минут</span>
        </div>
    </div>

    <!-- Навигация по категориям -->
    <div class="categories-nav" id="categoriesNav">
        <!-- Генерируется автоматически из JS -->
    </div>

    <!-- Основной контейнер с меню -->
    <div id="menuContainer">
        <!-- Сюда загружаются секции с товарами -->
    </div>

    <!-- Всплывающая плашка корзины снизу -->
    <div class="bottom-cart-bar" id="bottomCartBar">
        <button class="dodo-cart-btn" onclick="openCartCheckout()">
            <span>Корзинушка</span>
            <span id="cartTotalPrice">0 ₸</span>
        </button>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрываем приложение на весь экран
        tg.ready();
        
        // Меняем тему шапки самого ТГ на белую
        tg.setHeaderColor('#ffffff');
        tg.setBackgroundColor('#ffffff');

        // КРИТИЧЕСКИ ВАЖНО: Вставь сюда свою ссылку на бэкенд Google Таблиц
        const CONFIG = {
            API_URL: "https://script.google.com/macros/s/AKfycbztlLi7MWstDiWX4l8zwf3qzcpW0ceBbwpeSBySqbSOqDFz_Bfj4AN_iF99HH-jv1q3/exec"
        };

        // Состояние корзины и меню
        let cart = {};
        let menuData = [];

        // Демо-данные (на случай, если таблица пустая, чтобы сайт не открывался белым)
        const mockMenu = [
            { id: "1", name: "Филадельфия Лайт", category: "Роллы", price: 2100, description: "Нежный лосось, сливочный сыр крем-чиз, свежий огурец и рис.", img: "https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=400" },
            { id: "2", name: "Калифорния", category: "Роллы", price: 1800, description: "Снежный краб, майонез, огурец, авокадо, икра тобико.", img: "https://images.unsplash.com/photo-1611143669185-af224c5e3252?w=400" },
            { id: "3", name: "Запеченный Сет", category: "Сеты", price: 5500, description: "Три вида горячих запеченных роллов под фирменным соусом.", img: "https://images.unsplash.com/photo-1553621042-f6e147245754?w=400" },
            { id: "4", name: "Coca-Cola 0.5", category: "Напитки", price: 450, description: "Классический освежающий напиток.", img: "https://images.unsplash.com/photo-1622483767028-3f66f32aef97?w=400" }
        ];

        // Загрузка данных
        async function loadMenu() {
            try {
                // Пытаемся получить реальные данные из твоей таблицы
                const response = await fetch(`${CONFIG.API_URL}?action=getMenu`);
                if (response.ok) {
                    menuData = await response.json();
                } else {
                    menuData = mockMenu;
                }
            } catch (e) {
                console.log("Используем демо-меню:", e);
                menuData = mockMenu;
            }
            renderUI();
        }

        // Отрисовка всего интерфейса
        function renderUI() {
            const categories = [...new Set(menuData.map(item => item.category))];
            
            // 1. Отрисовка табов категорий
            const nav = document.getElementById('categoriesNav');
            nav.innerHTML = categories.map((cat, index) => `
                <button class="category-tab ${index === 0 ? 'active' : ''}" onclick="scrollToCategory('${cat}', this)">
                    ${cat}
                </button>
            `).join('');

            // 2. Отрисовка секций товаров
            const container = document.getElementById('menuContainer');
            container.innerHTML = categories.map(cat => `
                <div class="category-section" id="cat-${cat}">
                    <div class="category-title">${cat}</div>
                    <div class="products-list">
                        ${menuData.filter(item => item.category === cat).map(product => renderProductCard(product)).join('')}
                    </div>
                </div>
            `).join('');
        }

        // Рендер отдельной Додо-карточки
        function renderProductCard(p) {
            const count = cart[p.id] ? cart[p.id].count : 0;
            return `
                <div class="product-card">
                    <img src="${p.img || 'https://via.placeholder.com/120'}" class="product-image" alt="${p.name}">
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-description">${p.description || ''}</div>
                        <div class="product-footer">
                            <div id="btn-container-${p.id}">
                                ${count > 0 ? renderCounter(p.id, count) : `<button class="dodo-btn-price" onclick="addToCart('${p.id}')">${p.price} ₸</button>`}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCounter(id, count) {
            return `
                <div class="counter-control">
                    <button class="counter-btn" onclick="changeCount('${id}', -1)">-</button>
                    <div class="counter-value">${count}</div>
                    <button class="counter-btn" onclick="changeCount('${id}', 1)">+</button>
                </div>
            `;
        }

        // Логика корзины
        function addToCart(id) {
            const product = menuData.find(item => item.id === id);
            cart[id] = { product, count: 1 };
            updateProductUI(id);
            updateCartBar();
        }

        function changeCount(id, delta) {
            if (!cart[id]) return;
            cart[id].count += delta;
            if (cart[id].count <= 0) {
                delete cart[id];
            }
            updateProductUI(id);
            updateCartBar();
        }

        function updateProductUI(id) {
            const container = document.getElementById(`btn-container-${id}`);
            if (!container) return;
            
            if (cart[id]) {
                container.innerHTML = renderCounter(id, cart[id].count);
            } else {
                const product = menuData.find(item => item.id === id);
                container.innerHTML = `<button class="dodo-btn-price" onclick="addToCart('${id}')">${product.price} ₸</button>`;
            }
        }

        function updateCartBar() {
            const bar = document.getElementById('bottomCartBar');
            const priceText = document.getElementById('cartTotalPrice');
            
            let totalItems = 0;
            let totalPrice = 0;
            
            for (let id in cart) {
                totalItems += cart[id].count;
                totalPrice += cart[id].count * cart[id].product.price;
            }
            
            if (totalItems > 0) {
                bar.style.display = 'block';
                priceText.innerText = `${totalPrice} ₸`;
            } else {
                bar.style.display = 'none';
            }
        }

        // Плавный скролл к категории при нажатии на таб
        function scrollToCategory(catId, tabElement) {
            // Меняем активный класс у табов
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            tabElement.classList.add('active');

            const element = document.getElementById(`cat-${catId}`);
            if (element) {
                const offset = 60; // Высота липкой панели
                const bodyRect = document.body.getBoundingClientRect().top;
                const elementRect = element.getBoundingClientRect().top;
                const elementPosition = elementRect - bodyRect;
                const offsetPosition = elementPosition - offset;

                window.scrollTo({
                    top: offsetPosition,
                    behavior: 'smooth'
                });
            }
        }

        // Передача собранного заказа обратно в бота
        function openCartCheckout() {
            let orderList = [];
            let total = 0;
            
            for (let id in cart) {
                const item = cart[id];
                orderList.push(`${item.product.name} x${item.count}`);
                total += item.count * item.product.price;
            }

            // Формируем объект данных для отправки обратно в ТГ-бот
            const orderData = {
                items: orderList,
                totalPrice: total
            };

            // Отправляем данные в Телеграм. Бот поймает это событие!
            tg.sendData(JSON.stringify(orderData));
            tg.close();
        }

        // Запуск при загрузке страницы
        window.onload = loadMenu;
    </script>
</body>
</html>
