<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Доставка еды</title>

  <!-- Bootstrap 5 + Иконки -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root { --accent: #e8590c; }
    body { padding-bottom: 76px; background: #f7f7f9; }
    .navbar-bottom {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1030;
      background: #fff; border-top: 1px solid #eee;
    }
    .navbar-bottom .nav-link { color: #888; font-size: .8rem; text-align: center; }
    .navbar-bottom .nav-link.active { color: var(--accent); }
    .navbar-bottom .nav-link i { display: block; font-size: 1.3rem; }
    .btn-accent { background: var(--accent); color: #fff; }
    .btn-accent:hover { background: #d04c06; color: #fff; }
    /* Горизонтальный скролл баннеров */
    .banner-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 4px 0 10px; scroll-snap-type: x mandatory; }
    .banner-scroll::-webkit-scrollbar { display: none; }
    .banner-card { flex: 0 0 85%; scroll-snap-align: start; border-radius: 14px; overflow: hidden;
                   position: relative; cursor: pointer; min-height: 130px; }
    .banner-card img { width: 100%; height: 130px; object-fit: cover; }
    .banner-card .caption { position: absolute; bottom: 0; left: 0; right: 0; color: #fff;
                            padding: 10px 12px; background: linear-gradient(transparent, rgba(0,0,0,.7)); }
    /* Карточка блюда */
    .menu-card img { width: 90px; height: 90px; object-fit: cover; border-radius: 10px; }
    .cat-pill { white-space: nowrap; }
    .cart-fab { position: fixed; bottom: 88px; right: 16px; z-index: 1020; border-radius: 50px; }
    .tag-badge { font-size: .65rem; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- ШАПКА -->
  <header class="bg-white shadow-sm sticky-top">
    <div class="container py-2 d-flex justify-content-between align-items-center">
      <h5 class="m-0 fw-bold" style="color:var(--accent)"><i class="bi bi-shop"></i> Вкусно тут</h5>
      <button class="btn btn-sm btn-light" id="profileBtn">
        <i class="bi bi-person-circle"></i> <span id="profileLabel">Войти</span>
      </button>
    </div>
  </header>

  <!-- Плашка нового пользователя -->
  <div id="newUserBanner" class="container mt-2 hidden">
    <div class="alert alert-warning d-flex justify-content-between align-items-center mb-0 py-2">
      <small>👋 Вы у нас впервые! Зарегистрируйтесь и получите приветственный бонус!</small>
      <button class="btn btn-sm btn-accent ms-2" data-bs-toggle="modal" data-bs-target="#authModal">Войти</button>
    </div>
  </div>

  <!-- ================= СЕКЦИЯ: МЕНЮ ================= -->
  <main id="menuPage" class="container mt-3">

    <!-- Баннеры (акции) -->
    <div id="bannerScroll" class="banner-scroll"></div>

    <!-- Фильтр категорий -->
    <div id="categoryBar" class="d-flex gap-2 overflow-auto pb-2 mb-2"></div>

    <!-- Список блюд -->
    <div id="menuList"></div>
  </main>

  <!-- ================= СЕКЦИЯ: МОИ ЗАКАЗЫ ================= -->
  <main id="ordersPage" class="container mt-3 hidden">
    <h6 class="mb-3">Мои заказы</h6>
    <div id="ordersList"></div>
  </main>

  <!-- Кнопка корзины -->
  <button class="btn btn-accent cart-fab shadow hidden" id="cartFab" data-bs-toggle="modal" data-bs-target="#cartModal">
    <i class="bi bi-bag"></i> <span id="cartCount">0</span> · <span id="cartTotal">0</span> ₸
  </button>

  <!-- ================= НИЖНЕЕ МЕНЮ ================= -->
  <nav class="navbar-bottom">
    <div class="container d-flex">
      <a href="#" class="nav-link flex-fill active" data-page="menu"><i class="bi bi-grid"></i>Меню</a>
      <a href="#" class="nav-link flex-fill" data-page="orders"><i class="bi bi-receipt"></i>Мои заказы</a>
    </div>
  </nav>

  <!-- ================= МОДАЛКА: АВТОРИЗАЦИЯ ================= -->
  <div class="modal fade" id="authModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header"><h6 class="modal-title">Вход / Регистрация</h6>
          <button class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <!-- Шаг 1: данные -->
          <div id="authStep1">
            <input id="authName" class="form-control mb-2" placeholder="Имя">
            <input id="authPhone" class="form-control mb-2" placeholder="Телефон, напр. +77001234567">
            <input id="authAddress" class="form-control mb-2" placeholder="Адрес доставки">
            <input id="authPromo" class="form-control mb-3" placeholder="Промокод друга (необязательно)">
            <button class="btn btn-accent w-100" id="authRequestBtn">Получить код</button>
          </div>
          <!-- Шаг 2: подтверждение через WhatsApp -->
          <div id="authStep2" class="hidden text-center">
            <p class="small text-muted">Отправьте код администратору в WhatsApp, затем вернитесь и нажмите «Я отправил код».</p>
            <a id="waConfirmLink" class="btn btn-success w-100 mb-2" target="_blank">
              <i class="bi bi-whatsapp"></i> Подтвердить через WhatsApp</a>
            <button class="btn btn-accent w-100" id="authConfirmBtn">Я отправил код</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= МОДАЛКА: БЛЮДО / БАННЕР ================= -->
  <div class="modal fade" id="infoModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header"><h6 class="modal-title" id="infoTitle"></h6>
          <button class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body" id="infoBody"></div>
      </div>
    </div>
  </div>

  <!-- ================= МОДАЛКА: КОРЗИНА И ЗАКАЗ ================= -->
  <div class="modal fade" id="cartModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header"><h6 class="modal-title">Корзина</h6>
          <button class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <div id="cartItems"></div>

          <hr>
          <!-- Тип заказа -->
          <label class="form-label small fw-bold">Тип заказа</label>
          <select id="orderType" class="form-select mb-2">
            <option value="Доставка">Доставка</option>
            <option value="Самовывоз">Самовывоз</option>
            <option value="Предзаказ">Предзаказ</option>
          </select>
          <div id="preorderBox" class="mb-2 hidden">
            <input type="datetime-local" id="preorderTime" class="form-control">
          </div>

          <!-- Способ оплаты -->
          <label class="form-label small fw-bold">Оплата</label>
          <select id="paymentMethod" class="form-select mb-2">
            <option value="Каспи">Каспи</option>
            <option value="Перевод">Перевод</option>
            <option value="Наличные">Наличные</option>
          </select>

          <!-- Промокод -->
          <label class="form-label small fw-bold">Промокод</label>
          <div class="input-group mb-2">
            <input type="text" id="promoInput" class="form-control" placeholder="Введите промокод">
            <button class="btn btn-outline-secondary" id="promoApplyBtn">Применить</button>
          </div>
          <div id="promoMsg" class="small mb-2"></div>

          <!-- Списание бонусов -->
          <div id="bonusBox" class="mb-2 hidden">
            <label class="form-label small fw-bold">
              Списать бонусы (доступно <span id="bonusAvail">0</span>, макс. <span id="bonusMax">0</span>)
            </label>
            <input type="number" id="bonusInput" class="form-control" value="0" min="0">
          </div>

          <div id="discountRow" class="d-flex justify-content-between mt-2 text-success hidden">
            <span>Скидка по промокоду:</span>
            <strong id="discountSum">0 ₸</strong>
          </div>
          <div class="d-flex justify-content-between mt-2">
            <span class="text-muted">Итого к оплате:</span>
            <strong id="finalSum">0 ₸</strong>
          </div>

          <button class="btn btn-success w-100 mt-3" id="sendOrderBtn">
            <i class="bi bi-whatsapp"></i> Отправить заказ в WhatsApp
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS + логика приложения -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
